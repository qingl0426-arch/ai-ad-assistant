# ============================================================
# AI Ad Assistant — Nginx 生产配置
# 路径：/etc/nginx/sites-available/ai-ad-assistant
# 启用：ln -sf 该文件 /etc/nginx/sites-enabled/ && nginx -s reload
# ============================================================

server {
    listen 80;
    server_name _;

    # ── 访问日志 ──────────────────────────
    access_log /var/log/nginx/ai-ad-assistant-access.log;
    error_log  /var/log/nginx/ai-ad-assistant-error.log;

    # ── 安全响应头 ────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── 请求体大小限制 ────────────────────
    client_max_body_size 50M;

    # ── Gzip 压缩 ─────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # ── Next.js 静态资源 (长期缓存) ───────
    location /_next/static {
        alias /opt/ai-ad-assistant/.next/static;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ── 公共资源 ──────────────────────────
    location /public {
        alias /opt/ai-ad-assistant/public;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── 反向代理到 Next.js ───────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}
