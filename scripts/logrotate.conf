# ============================================================
# AI Ad Assistant — 日志轮转配置
# 路径：/etc/logrotate.d/ai-ad-assistant
# 生效：自动（logrotate 每天运行）
# 手动测试：logrotate -d /etc/logrotate.d/ai-ad-assistant
# ============================================================

/var/log/ai-ad-assistant/*.log {
    daily
    rotate 30
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    dateext
    dateformat -%Y%m%d
    maxsize 50M
    create 0640 root root
    sharedscripts
    postrotate
        pm2 reloadLogs
    endscript
}

/var/log/nginx/ai-ad-assistant-*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    dateext
    dateformat -%Y%m%d
    maxsize 100M
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid)
    endscript
}
